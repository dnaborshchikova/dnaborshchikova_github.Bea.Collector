name: .NET CI

on:
  push:
    branches:
      - master
      - 'feature-*'
    paths-ignore:
      - '**.md'
      - 'Dockerfile'
      - 'docker/**'

  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'Dockerfile'
      - 'docker/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore dnaborshchikova_github.Bea.Collector.sln

      - name: Build
        run: dotnet build dnaborshchikova_github.Bea.Collector.sln --configuration Release

      - name: Run tests
        run: dotnet test dnaborshchikova_github.Bea.Collector.Tests --no-build --configuration Release --verbosity normal