version: '3.9'

services:
  db:
    image: postgres:15
    container_name: collector_db
    environment:
      TZ: "Europe/Moscow"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Collector
    ports:
      - "5432:5432"
    volumes:
      - dnaborshchikova_githubbeacollector_pgdata:/var/lib/postgresql/data

  collector:
    build: .
    container_name: collector_app
    depends_on:
      - db
    environment:
      TZ: "Europe/Moscow"
      ProcessingSettings__InputFolder: "/app/input"
      PROCESSING_FOLDER_PATH: /files
      ConnectionStrings__Default: Host=db;Port=5432;Database=Collector;Username=postgres;Password=postgres
      ProcessingSettings__RunMode: "Worker"
    volumes:
      - ./dnaborshchikova_github.Bea.Collector.WorkerService/TestData:/app/input

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  dnaborshchikova_githubbeacollector_pgdata: